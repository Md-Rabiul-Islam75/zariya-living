services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: zariya-living
    container_name: zariya-living
    restart: unless-stopped
    # Host 8010 -> container 8010 (app listens on 8010 inside the container too)
    ports:
      - "8010:8010"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=8010
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8010/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
